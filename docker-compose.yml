services:
  mail-forwarder:
    build: .
    volumes:
      - ./config.yaml:/etc/mail-forwarder/config.yaml:ro
      - forwarder-state:/data
    environment:
      # talent-bank PG 连接
      MAIL_FORWARDER_DATABASE_HOST: ${DB_HOST:-localhost}
      MAIL_FORWARDER_DATABASE_PORT: ${DB_PORT:-5432}
      MAIL_FORWARDER_DATABASE_NAME: ${DB_NAME:-talentbank}
      MAIL_FORWARDER_DATABASE_USER: ${DB_USER:-forwarder_readonly}
      MAIL_FORWARDER_DATABASE_PASSWORD: ${DB_PASSWORD:-}
      MAIL_FORWARDER_DATABASE_SSL_MODE: ${DB_SSL_MODE:-disable}
      # 公共邮箱 IMAP 密码
      MAIL_FORWARDER_SOURCE_MAILBOX_PASSWORD: ${IMAP_PASSWORD:-}
      # SMTP 密码
      MAIL_FORWARDER_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    restart: unless-stopped

volumes:
  forwarder-state:
